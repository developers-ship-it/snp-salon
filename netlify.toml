# Netlify deployment config for the Salt 'N' Pepper React app (Vite)
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# SPA fallback: serve index.html for client-side React Router routes.
# Real files (e.g. /pages/*.html, /wp-content/*) are served first; only
# unmatched paths (like /about-us, /services) fall back to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
